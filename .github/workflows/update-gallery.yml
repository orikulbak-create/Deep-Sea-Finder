name: Update Video Gallery
 
on:
  push:
    paths:
      - 'videos.json'
  workflow_dispatch:
 
jobs:
  update-gallery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
 
      - name: Commit videos.json if changed
        run: |
          git config user.name "Deep Sea Finder Bot"
          git config user.email "actions@github.com"
          git add videos.json
          git diff --staged --quiet || git commit -m "Update video gallery"
          git push
 
